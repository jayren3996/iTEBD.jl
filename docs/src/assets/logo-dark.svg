<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- iTEBD.jl dark-mode logo. Same diagram as logo.svg with lighter leg
       strokes; gate fill stays Julia blue so it works in both modes. -->

  <!-- Horizontal bond line through the chain (drawn behind tensors) -->
  <line x1="50" y1="185" x2="190" y2="185"
        stroke="#c8ccd2" stroke-width="2" stroke-linecap="round"/>

  <!-- Free physical leg on site 1 (red) -->
  <line x1="50" y1="163" x2="50" y2="30"
        stroke="#c8ccd2" stroke-width="2" stroke-linecap="round"/>

  <!-- Incoming gate legs on sites 2 and 3 (tensor top up to gate bottom) -->
  <line x1="120" y1="163" x2="120" y2="110"
        stroke="#c8ccd2" stroke-width="2" stroke-linecap="round"/>
  <line x1="190" y1="163" x2="190" y2="110"
        stroke="#c8ccd2" stroke-width="2" stroke-linecap="round"/>

  <!-- Outgoing gate legs on sites 2 and 3 (gate top continuing up) -->
  <line x1="120" y1="60" x2="120" y2="30"
        stroke="#c8ccd2" stroke-width="2" stroke-linecap="round"/>
  <line x1="190" y1="60" x2="190" y2="30"
        stroke="#c8ccd2" stroke-width="2" stroke-linecap="round"/>

  <!-- Two-site gate: filled Julia blue, the hero shape -->
  <rect x="100" y="60" width="110" height="50" rx="10" ry="10" fill="#4063D8"/>

  <!-- Tensor circles in three Julia palette colors -->
  <circle cx="50"  cy="185" r="22" fill="#CB3C33"/>
  <circle cx="120" cy="185" r="22" fill="#389826"/>
  <circle cx="190" cy="185" r="22" fill="#9558B2"/>
</svg>
